site_name: Neo4j Policy-Based Backup / Restore
site_description: Policy-driven, validated backup/restore for self-hosted Neo4j Enterprise — Dagster and Airflow orchestrators over a shared core
# The markdown lives at the repo root (for GitHub); `mkdocs-stage.sh` copies the curated
# set into docs/ for the build. Run `just docs` (or the Pages workflow).
docs_dir: docs
site_dir: _site
use_directory_urls: true

repo_url: https://github.com/lex00/neo4j-backup
repo_name: lex00/neo4j-backup

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top

nav:
  - Home: README.md
  - Policy: POLICY.md
  - Recovery: RECOVERY.md
  - Design: DESIGN.md
  - Local stack: STACK.md
  - CLI contract: CLI-CONTRACT.md
  - Orchestrators:
    - Dagster: orchestrator/README.md
    - Airflow: airflow/README.md
  - Deploy / adapt: orchestrator/deploy/DEPLOY.md
  - Diagrams: diagrams/README.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
