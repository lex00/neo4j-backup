name: CI

on:
  push:
  pull_request:

# Cheap checks that need no Docker/Neo4j: naming parity (naming.py == naming.sh), that
# the Dagster code location resolves, and that every Airflow DAG parses with no import
# errors. The full end-to-end smokes need the local stack (see STACK.md) and run on a
# developer machine, not CI.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e 'orchestrator[dev,azure]'
      - name: naming parity (naming.py == naming.sh)
        run: pytest orchestrator/tests/ -q
      - name: validate Dagster definitions
        env:
          NEO4J_PASSWORD: dummy
        run: dagster definitions validate -m neo4j_backup_dagster.definitions

  airflow-dags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install Airflow + adapter (no Dagster)
        run: |
          pip install "apache-airflow[cncf.kubernetes,amazon,neo4j]==3.2.2" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-3.2.2/constraints-3.12.txt"
          pip install -e orchestrator --no-deps
          pip install neo4j pytest
      - name: DAG parse / import-error check (DagBag)
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
        run: pytest airflow/tests/ -q
