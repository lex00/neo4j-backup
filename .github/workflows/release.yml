name: Release

# Cut a GitHub Release when a version tag is pushed. Consumption is vendored source + a pinned
# git tag (no PyPI), so the Release is the tag's auto-attached source archive + generated notes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so --generate-notes can diff from the previous tag
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag
