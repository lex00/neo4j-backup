name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish the docs (MkDocs Material + rendered Graphviz diagrams) to GitHub Pages.
# One-time: repo Settings → Pages → Source = "GitHub Actions".
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install graphviz (diagram rendering)
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - name: Stage docs + render diagrams
        run: ./mkdocs-stage.sh
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
