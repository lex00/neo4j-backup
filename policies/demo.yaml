# Demo backup policy. The db_group is the policy + PITR-alignment unit (DESIGN.md §2);
# `owner` is optional metadata. Applications connect to ALIASES; physical database
# names are generated by the naming authority (bootstrap/naming.sh) and repointed on
# restore. The orchestrator (next layer) loads and validates this file.

db_groups:
  - id: demo
    owner: acme                  # optional; reporting only, drives nothing
    # Stable app-facing aliases. Neo4j's full alias charset is allowed (teams keep
    # their existing names); the naming authority derives db-legal slugs + timestamps
    # for the physical databases and storage prefixes.
    aliases:
      - acme-orders
      - acme-graph
      - acme-audit
    tier: gold
    s3_prefix: s3://neo4j-backups/demo/
    retention_days: 7
    rpo_minutes: 60
    rto_minutes: 120
    # Server-side SSE-KMS (DESIGN.md "Backup-file encryption"): per-group key = the
    # bucket's default KMS key, read transparently by seed-from-URI restore. Local dev
    # stands in with MinIO's built-in KMS key (KMS_KEY_NAME).
    encryption:
      mode: sse-kms
      kms_key_ref: demo-group-key   # cloud KMS key id/alias; local: MinIO key name
    overrides: {}                   # per-alias cadence overrides (optional)

tiers:
  gold:   { full_cron: "0 2 * * *",   diff_cron: "0 * * * *" }    # daily full, hourly diff
  silver: { full_cron: "0 3 * * 0",   diff_cron: "0 */6 * * *" }  # weekly full, 6h diff
  bronze: { full_cron: "0 4 * * 0",   diff_cron: "0 0 * * *" }    # weekly full, daily diff
